<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuveration</title>

    <link rel="icon" type="image/png" href="LOGO.png">
    <link rel="apple-touch-icon" href="LOGO.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'League Spartan', sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            width: 150px;
            height: 150px;
            margin-bottom: 40px;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            display: block;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #000000;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="LOGO.png" alt="Nuveration" class="logo">

        <nav class="nav-links">
            <a href="https://nuvex.nuveration.com" class="btn">Nuvex</a>
            <a href="https://familypack.nuveration.com/Sonation/" class="btn">Sonation</a>
            <a href="https://familypack.nuveration.com/Famorg/" class="btn">famorg</a>
            <a href="https://smartscroll.nuveration.com" class="btn">SmartScroll</a>
            <a href="https://famedia-hub.lovable.app" class="btn">Famedia</a>
            <a href="https://besocial-hub.lovable.app" class="btn">BeSocial</a>
            <a href="https://pray2day.github.io" class="btn">Pray2Day</a>
        </nav>
    </div>

    <footer>
        NUVERATION &copy; 2026
    </footer>

</body>
</html>
